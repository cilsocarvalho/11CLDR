name: pipeline

on:
  push:
  workflow_dispatch:

jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # ... rest of steps

  SAST:
    runs-on: ubuntu-latest   
    needs: unit-test 
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      # ... steps

  code-analysis:  # Now properly indented as a job
    runs-on: ubuntu-latest
    needs: unit-test
    steps:
      # ... steps

  # ... other jobs ...

  deploy-azure:  # Now at correct indentation level
    needs: build
    name: Deploy-azure
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: AZURE-PRO
      url: https://devopsfiap-on-app.azurewebsites.net/
    steps:
      - name: Download JAR
        uses: actions/download-artifact@v3
        with:
          name: application-jar  # Fixed artifact name
          path: target/
      - name: DeployAzure
        uses: azure/webapps-deploy@v2
        with:
          app-name: devopsfiap-on-app
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: '${{ github.workspace }}/target/*.jar'
